services:
  backend:
    build: ./backend
    ports:
      - "3000:80"
    # SECRET_KEY_BASE is required in production; this default is for clone-and-run demos only.
    # Override: SECRET_KEY_BASE=... docker compose up  or  echo SECRET_KEY_BASE=... >> .env
    environment:
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:-1c7795337b597afa635c23fd1e97f819e4779ed61264d44271fca149acea052b970f3bf7ebcdc4ad311c449840a9648bc6c22aac8403c85e8766b989da58bb64}
    volumes:
      - backend_storage:/rails/storage

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  backend_storage:
